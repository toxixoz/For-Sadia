<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MUHIN AND SADIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@900&family=Mountains+of_Christmas:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .falling { position: fixed; top: -10%; color: rgba(255, 255, 255, 0.6); font-size: 1.5rem; animation: fall linear infinite; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh); } }
        
        .wrapper {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; padding: 5px; border-radius: 45px;
            position: relative; overflow: hidden;
        }
        .wrapper::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000);
            animation: rotate 3s linear infinite;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .main-card { 
            position: relative; background: rgba(0, 0, 0, 0.9); border-radius: 40px; 
            padding: 35px; text-align: center; color: white; z-index: 1;
        }
        
        h1 { font-family: 'Mountains of Christmas', cursive; font-size: 3rem; margin-bottom: 20px; }
        .m-color { color: #2ecc71; } .a-color { color: #ffffff; } .s-color { color: #f1c40f; }
        .bio { font-family: 'Dancing Script', cursive; font-size: 1.2rem; margin-bottom: 25px; color: #ff9ff3; }
        
        .clock-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .time-box { background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 15px; }
        .time-box span { display: block; font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: bold; }
        .c1 { color: #ff6b6b; } .c2 { color: #feca57; } .c3 { color: #48dbfb; } .c4 { color: #1dd1a1; } .c5 { color: #ff9ff3; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: #aaa; }

        .play-btn {
            margin-top: 20px; padding: 15px 30px; border-radius: 50px; border: none;
            background: linear-gradient(45deg, #ff4d6d, #ff758c); color: white;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="main-card">
            <h1><span class="m-color">MUHIN</span> <span class="a-color">AND</span> <span class="s-color">SADIA</span></h1>
            <p class="bio">"My today, tomorrow, and my entire forever."</p>
            
            <div class="clock-container">
                <div class="time-box"><span class="c1" id="m">00</span><div class="label">Months</div></div>
                <div class="time-box"><span class="c2" id="d">00</span><div class="label">Days</div></div>
                <div class="time-box"><span class="c3" id="h">00</span><div class="label">Hours</div></div>
                <div class="time-box"><span class="c4"><b id="min">00</b>:<b class="c5" id="sec">00</b></span><div class="label">Min:Sec</div></div>
            </div>

            <button class="play-btn" id="play-btn">M❤️‍🩹S</button>
            <audio id="bg-song">
                <source src="music.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        const items = ['❤️', '✨', '🌸'];
        function createRain() {
            const el = document.createElement('div');
            el.innerHTML = items[Math.floor(Math.random() * items.length)];
            el.className = 'falling';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }
        setInterval(createRain, 500);

        function updateClock() {
            const start = new Date("2025-06-23T00:00:00");
            const now = new Date();
            const diff = now - start;
            document.getElementById("m").innerHTML = Math.floor(diff / (1000*60*60*24*30.44));
            document.getElementById("d").innerHTML = Math.floor((diff % (1000*60*60*24*30.44)) / (1000*60*60*24));
            document.getElementById("h").innerHTML = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            document.getElementById("min").innerHTML = Math.floor((diff % (1000*60*60)) / (1000*60));
            document.getElementById("sec").innerHTML = Math.floor((diff % (1000*60)) / 1000);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // গানের টাইমিং
        const audio = document.getElementById('bg-song');
        const btn = document.getElementById('play-btn');

        btn.addEventListener('click', () => {
            audio.currentTime = 130; // ২:১০ (১৩০ সেকেন্ড)
            audio.play();
            
            audio.ontimeupdate = function() {
                if (audio.currentTime >= 152) { // ২:৩২ (১৫২ সেকেন্ড)
                    audio.pause();
                    audio.currentTime = 130;
                }
            };
        }, { once: true });
    </script>
</body>
</html>
